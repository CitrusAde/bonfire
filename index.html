<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>bonfire</title>
  <style>
    /* 기본 리셋 및 도트/레트로 텍스트 감성 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #050505;
      color: #dfdfdf;
      font-family: 'DungGeunMo', 'Galmuri11', 'Malgun Gothic', monospace; /* 픽셀 폰트 권장 */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* 980x540 메인 컨테이너 */
    #game-container {
      width: 980px;
      height: 540px;
      background-color: #0f0c0c;
      /* 첨부해주신 도트 아트 이미지를 넣을 때는 아래 주석을 풀고 파일명을 넣으세요! */
      /* background-image: url('my-pixel-forest.png'); */
      background-size: cover;
      background-position: center;
      position: relative;
      border: 4px solid #1f1a1a;
      box-shadow: 0 0 50px rgba(0,0,0,0.9);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    /* CSS로 표현한 중앙 모닥불 연출 (이미지 사용 시 숨기거나 연출용으로 겹쳐 쓰기 가능) */
    #campfire-scene {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1;
      pointer-events: none;
    }
    .fire-anim {
      font-size: 80px;
      filter: drop-shadow(0 0 25px rgba(255, 85, 0, 0.8));
      animation: flicker 1.5s infinite alternate ease-in-out;
    }
    @keyframes flicker {
      0% { transform: scale(0.98) rotate(-1deg); filter: drop-shadow(0 0 20px rgba(255, 85, 0, 0.7)); }
      100% { transform: scale(1.03) rotate(1deg); filter: drop-shadow(0 0 35px rgba(255, 120, 0, 0.9)); }
    }

    /* 하단 대화창 UI (비주얼 노벨 스타일) */
    #dialogue-box {
      width: 920px;
      min-height: 180px;
      margin: 0 auto 20px auto;
      background-color: rgba(15, 12, 12, 0.92);
      border: 3px solid #4a3c31;
      border-radius: 4px;
      padding: 24px 30px;
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 5px 25px rgba(0,0,0,0.8);
    }

    /* 캐릭터 이름 태그 */
    #char-name {
      font-size: 18px;
      color: #ff8c42;
      font-weight: bold;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    /* 대사 출력 영역 */
    #char-text {
      font-size: 16px;
      color: #eaeaea;
      line-height: 1.6;
      min-height: 50px;
      margin-bottom: 15px;
      white-space: pre-line;
    }

    /* 선택지 버튼 영역 */
    #choice-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .choice-btn {
      background: #1a1614;
      color: #ccc;
      border: 1px solid #4a3c31;
      padding: 10px 16px;
      font-size: 15px;
      font-family: inherit;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .choice-btn:hover {
      background: #332821;
      color: #fff;
      border-color: #ff8c42;
      transform: translateX(6px);
    }

    /* 화면 전환용 오버레이 (시작화면, 엔딩화면, 도감) */
    .overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(8, 6, 6, 0.96);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      padding: 40px;
    }
    .hidden { display: none !important; }
    
    h1 {
      font-size: 54px;
      color: #ff6b35;
      margin-bottom: 15px;
      letter-spacing: 6px;
      text-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
    }
    .subtitle { color: #888; margin-bottom: 50px; font-size: 16px; letter-spacing: 1px; }
    
    .center-btn-group { display: flex; gap: 20px; }
    .center-btn {
      padding: 14px 32px;
      font-size: 16px;
      font-family: inherit;
      background-color: #ff6b35;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: filter 0.2s;
    }
    .center-btn.secondary {
      background-color: #1a1614;
      border: 2px solid #4a3c31;
      color: #ccc;
    }
    .center-btn:hover { filter: brightness(1.2); }

    /* 엔딩 도감 팝업 */
    #archive-popup {
      background: #14100e;
      border: 2px solid #4a3c31;
      width: 640px;
      max-height: 440px;
      padding: 30px;
      overflow-y: auto;
    }
    #archive-popup h2 {
      margin-bottom: 20px; color: #ff8c42; font-size: 22px;
      border-bottom: 1px solid #332821; padding-bottom: 10px;
    }
    .archive-item { margin-bottom: 15px; padding: 15px; background: #1c1714; border: 1px solid #2d241f; }
    .archive-title { font-weight: bold; color: #ff6b35; margin-bottom: 8px; font-size: 16px; }
    .archive-desc { font-size: 14px; color: #aaa; line-height: 1.5; }
    .locked { color: #555; font-style: italic; }
  </style>
</head>
<body>

<div id="game-container">
  <!-- 배경 모닥불 (도트 이미지 넣을 시 자연스럽게 어우러지거나 숨길 수 있음) -->
  <div id="campfire-scene">
    <div class="fire-anim">🔥</div>
  </div>

  <!-- 하단 비주얼 노벨 대화 UI -->
  <div id="dialogue-box">
    <div>
      <div id="char-name"></div>
      <div id="char-text"></div>
    </div>
    <div id="choice-container"></div>
  </div>

  <!-- 시작 화면 -->
  <div id="start-screen" class="overlay">
    <h1>bonfire</h1>
    <div class="subtitle">어두운 숲, 타오르는 불꽃, 그리고 당신의 선택</div>
    <div class="center-btn-group">
      <button class="center-btn" onclick="startGame()">게임 시작</button>
      <button class="center-btn secondary" onclick="openArchive()">엔딩 도감</button>
    </div>
  </div>

  <!-- 엔딩 도감 팝업 -->
  <div id="archive-screen" class="overlay hidden">
    <div id="archive-popup">
      <h2>📖 엔딩 기록</h2>
      <div id="archive-list"></div>
      <div style="text-align: right; margin-top: 25px;">
        <button class="center-btn secondary" onclick="closeArchive()">닫기</button>
      </div>
    </div>
  </div>

  <!-- 엔딩 화면 -->
  <div id="ending-screen" class="overlay hidden">
    <h1 id="end-title" style="font-size: 32px; color: #ff8c42;"></h1>
    <div id="end-desc" class="subtitle" style="max-width: 650px; text-align: center; line-height: 1.8; margin: 25px 0 45px 0; color: #ccc;"></div>
    <button class="center-btn" onclick="returnToTitle()">타이틀로 돌아가기</button>
  </div>
</div>

<script>
  /* --- [1. 스토리 및 대사 트리 (완전 분기형)] --- */
  // 수치 계산 없이, 선택지의 "next"가 다음 대사(Scene ID)를 직접 가리킵니다.
  const STORY_TREE = {
    // [프롤로그]
    "start": {
      name: "나",
      text: "스산한 밤바람이 숲을 감싼다. 모닥불의 타닥거리는 소리만이 고요함을 깨우고 있다.\n이 어둠 속에서 밤을 지새워야 한다.",
      choices: [
        { text: "장작을 하나 더 던져 넣고 조용히 불을 쬔다.", next: "meet_stranger_1" }
      ]
    },

    // [첫 번째 만남 - 방랑자]
    "meet_stranger_1": {
      name: "떨고 있는 방랑자",
      text: "어둠 속에서 바스락거리는 발소리가 들리더니, 낡은 망토를 쓴 사내가 모습을 드러낸다.\n'이보시오... 불빛을 보고 왔소. 몸이 얼어 죽을 것 같으니 잠시 곁에 앉아도 되겠소?'",
      choices: [
        { text: "'경계는 늦추지 않겠소. 불만 쬐고 떠나시오.' (냉정한 태도)", next: "path_cold_1" },
        { text: "'물론이오. 여기 따뜻한 자리로 오시오.' (이타적인 태도)", next: "path_warm_1" },
        { text: "'이 깊은 숲속을 혼자 걷다니, 당신은 대체 누구요?' (의심과 질문)", next: "path_weird_1" }
      ]
    },

    /* === [분기 A: 냉정/생존 루트로 진입했을 때 만나는 캐릭터] === */
    "path_cold_1": {
      name: "떨고 있는 방랑자",
      text: "'참으로 차가운 사람이군... 그래도 이 불빛 덕에 살았소.'\n방랑자는 굳은 표정으로 불만 쬐더니 아침이 되기 전 훌쩍 떠나버렸다.",
      choices: [
        { text: "남을 신경 쓸 여유는 없다. 내 생존이 우선이다.", next: "meet_mercenary" }
      ]
    },
    "meet_mercenary": {
      name: "부상당한 용병",
      text: "다음 날 밤, 피 냄새를 풍기며 거친 용병이 모닥불로 나타났다.\n'쯧, 당신... 눈빛을 보니 남 돕는 성격은 아니군. 숲을 빠져나갈 지도와 장비를 줄 테니, 내 뒤를 쫓는 놈들이 오면 딴 길로 알려줘.'",
      choices: [
        { text: "'좋다. 장비를 놔두고 저쪽 부서진 오두막에 숨어 있어라.'", next: "end_escape_pre" },
        { text: "'귀찮은 일에 엮이기 싫다. 내 불빛에서 당장 꺼져라.'", next: "end_escape_pre" }
      ]
    },
    "end_escape_pre": {
      name: "나",
      text: "나는 용병이 챙겨준 생존 장비와 지도를 단단히 챙겼다.\n다른 이들이 숲에서 비명을 지르든 말든, 나만 살아서 이곳을 빠져나가면 그만이다.",
      choices: [
        { text: "모닥불을 등지고 문명 세계로 발걸음을 옮긴다.", next: "END_1" }
      ]
    },

    /* === [분기 B: 이타/희생 루트로 진입했을 때 만나는 캐릭터] === */
    "path_warm_1": {
      name: "떨고 있는 방랑자",
      text: "'정말 고맙소...! 당신의 온기 덕에 오늘 밤을 넘길 수 있겠군요.'\n그는 눈물을 글썽이며, 이 숲에 길을 잃은 가엾은 사람들이 더 많다는 이야기를 들려주었다.",
      choices: [
        { text: "더 많은 장작을 주워와 모닥불의 불꽃을 크게 키운다.", next: "meet_pilgrim" }
      ]
    },
    "meet_pilgrim": {
      name: "길을 잃은 순례자들",
      text: "불꽃이 거대해지자, 멀리서 빛을 본 피난민과 순례자 무리가 모닥불로 몰려들었다.\n'오오... 이렇게 밝고 따뜻한 불빛이라니! 당신이 우리를 살렸습니다!'",
      choices: [
        { text: "가진 것을 모두 나누어주고, 그들의 안식처를 지켜주기로 결심한다.", next: "END_2" }
      ]
    },

    /* === [분기 C: 의심/진실 추구 루트로 진입했을 때 만나는 캐릭터] === */
    "path_weird_1": {
      name: "떨고 있는 방랑자",
      text: "그는 기묘한 미소를 지으며 모닥불의 불꽃을 가리켰다.\n'내가 누구인지는 중요하지 않소. 당신은 이 불이 그저 몸을 녹이기 위해 타오른다고 생각하시오?'",
      choices: [
        { text: "'무슨 소리냐? 이 불빛 아래 무엇이 있단 말인가?'", next: "meet_cultist" }
      ]
    },
    "meet_cultist": {
      name: "눈이 먼 광신도",
      text: "방랑자가 사라진 자리에, 눈이 먼 노인이 지팡이를 짚고 다가와 속삭였다.\n'이 숲은 거대한 제단... 네가 피운 불은 땅 밑에서 잠든 심연의 괴수를 부르는 신호다. 봐라, 불꽃의 색이 변하고 있지 않느냐!'",
      choices: [
        { text: "미친 소리다! 불을 더 세게 지펴서 이 어둠과 괴수를 모두 태워버린다!", next: "END_3" },
        { text: "노인의 말이 맞을지도 모른다. 발로 밟아 모닥불을 완전히 꺼버린다.", next: "END_3" }
      ]
    }
  };

  /* --- [2. 엔딩 데이터 및 도감 저장소] --- */
  const ENDINGS = {
    "END_1": {
      id: "END_1",
      title: "[엔딩 1: 차가운 탈출]",
      desc: "당신은 타인을 철저히 도구로 삼고, 오직 자신의 생존을 위한 장비만을 챙겨 숲을 무사히 빠져나왔습니다.\n문명 세계로 돌아왔지만, 꿈속에서 가끔 그 스산한 모닥불과 어둠 속에 남겨진 이들의 비명 소리가 귓가를 맴돕니다."
    },
    "END_2": {
      id: "END_2",
      title: "[엔딩 2: 구원의 봉화]",
      desc: "당신이 아낌없이 짚인 불꽃은 숲에서 가장 거대한 등대가 되었습니다.\n길을 잃은 수많은 사람들이 불빛을 찾아와 온기를 나누었고, 스산했던 어둠의 숲은 어느새 모두가 서로를 의지하는 따뜻한 안식처이자 마을이 되었습니다."
    },
    "END_3": {
      id: "END_3",
      title: "[엔딩 3: 고대의 봉인]",
      desc: "모닥불이 가진 섬뜩한 진실을 마주한 당신은 평범한 생존을 포기했습니다.\n숲의 깊은 심연, 그리고 불꽃의 기원과 맞닿은 당신의 운명은 이제 세상의 상식을 벗어난 거대한 비밀 속으로 영원히 잠겨들었습니다."
    }
  };

  function getUnlockedEndings() {
    const data = localStorage.getItem("bonfire_pixel_endings");
    return data ? JSON.parse(data) : [];
  }

  function unlockEnding(id) {
    const list = getUnlockedEndings();
    if (!list.includes(id)) {
      list.push(id);
      localStorage.setItem("bonfire_pixel_endings", JSON.stringify(list));
    }
  }

  /* --- [3. 게임 렌더링 엔진] --- */
  let currentScene = "start";

  function startGame() {
    document.getElementById("start-screen").classList.add("hidden");
    document.getElementById("ending-screen").classList.add("hidden");
    renderScene("start");
  }

  function renderScene(sceneId) {
    // 엔딩 ID에 도달한 경우 엔딩 처리
    if (ENDINGS[sceneId]) {
      triggerEnding(sceneId);
      return;
    }

    const scene = STORY_TREE[sceneId];
    if (!scene) return;

    currentScene = sceneId;
    document.getElementById("char-name").innerText = scene.name;
    document.getElementById("char-text").innerText = scene.text;

    const choiceContainer = document.getElementById("choice-container");
    choiceContainer.innerHTML = ""; // 기존 선택지 비우기

    scene.choices.forEach(choice => {
      const btn = document.createElement("button");
      btn.className = "choice-btn";
      btn.innerText = "▶ " + choice.text;
      btn.onclick = () => renderScene(choice.next);
      choiceContainer.appendChild(btn);
    });
  }

  function triggerEnding(endId) {
    const endData = ENDINGS[endId];
    unlockEnding(endId); // 도감에 자동 해금 저장

    document.getElementById("end-title").innerText = endData.title;
    document.getElementById("end-desc").innerText = endData.desc;
    document.getElementById("ending-screen").classList.remove("hidden");
  }

  function returnToTitle() {
    document.getElementById("ending-screen").classList.add("hidden");
    document.getElementById("start-screen").classList.remove("hidden");
  }

  /* --- [4. 도감 팝업 제어] --- */
  function openArchive() {
    const list = document.getElementById("archive-list");
    list.innerHTML = "";
    const unlocked = getUnlockedEndings();

    Object.values(ENDINGS).forEach(end => {
      const item = document.createElement("div");
      item.className = "archive-item";
      if (unlocked.includes(end.id)) {
        item.innerHTML = `<div class="archive-title">${end.title} [ 기록됨 ]</div><div class="archive-desc">${end.desc}</div>`;
      } else {
        item.innerHTML = `<div class="archive-title locked">??? [ 미발견 엔딩 ]</div><div class="archive-desc locked">아직 이 결말에 도달하지 못했습니다. 모닥불에서 다른 선택을 해보세요.</div>`;
      }
      list.appendChild(item);
    });

    document.getElementById("archive-screen").classList.remove("hidden");
  }

  function closeArchive() {
    document.getElementById("archive-screen").classList.add("hidden");
  }
</script>
</body>
</html>
