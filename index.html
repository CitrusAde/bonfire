<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>bonfire</title>
  <style>
    /* [1. 기본 리셋 및 도트/레트로 텍스트 감성] */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #050505;
      color: #dfdfdf;
      font-family: 'DungGeunMo', 'Galmuri11', 'Malgun Gothic', monospace; /* 픽셀 폰트 권장 */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* [2. 980x540 메인 컨테이너] */
    #game-container {
      width: 980px;
      height: 540px;
      background-color: #0d0a0a;
      /* 도트 이미지 배경 적용 시 아래 주석 해제 후 이미지 파일명 입력 */
      /* background-image: url('my-pixel-forest.png'); */
      background-size: cover;
      background-position: center;
      position: relative;
      border: 4px solid #1f1a1a;
      box-shadow: 0 0 60px rgba(0,0,0,0.95);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    /* [3. 중앙 모닥불 연출] */
    #campfire-scene {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1;
      pointer-events: none;
    }
    .fire-anim {
      font-size: 85px;
      filter: drop-shadow(0 0 25px rgba(255, 85, 0, 0.8));
      animation: flicker 1.5s infinite alternate ease-in-out;
    }
    @keyframes flicker {
      0% { transform: scale(0.98) rotate(-1deg); filter: drop-shadow(0 0 20px rgba(255, 85, 0, 0.7)); }
      100% { transform: scale(1.04) rotate(1deg); filter: drop-shadow(0 0 40px rgba(255, 120, 0, 0.95)); }
    }

    /* [4. 하단 비주얼 노벨 대화창 UI] */
    #dialogue-box {
      width: 920px;
      min-height: 190px;
      margin: 0 auto 20px auto;
      background-color: rgba(14, 11, 11, 0.94);
      border: 3px solid #4a3c31;
      border-radius: 4px;
      padding: 24px 30px;
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 5px 30px rgba(0,0,0,0.85);
    }

    #char-name {
      font-size: 18px;
      color: #ff8c42;
      font-weight: bold;
      margin-bottom: 12px;
      letter-spacing: 1.5px;
    }

    #char-text {
      font-size: 16px;
      color: #eaeaea;
      line-height: 1.6;
      min-height: 50px;
      margin-bottom: 16px;
      white-space: pre-line;
    }

    /* 선택지 버튼 영역 */
    #choice-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .choice-btn {
      background: #1a1614;
      color: #ccc;
      border: 1px solid #4a3c31;
      padding: 10px 16px;
      font-size: 15px;
      font-family: inherit;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .choice-btn:hover {
      background: #332821;
      color: #fff;
      border-color: #ff8c42;
      transform: translateX(6px);
    }

    /* [5. 오버레이 (시작화면, 엔딩화면, 도감)] */
    .overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(7, 5, 5, 0.96);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      padding: 40px;
    }
    .hidden { display: none !important; }
    
    h1 {
      font-size: 56px;
      color: #ff6b35;
      margin-bottom: 15px;
      letter-spacing: 6px;
      text-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
    }
    .subtitle { color: #888; margin-bottom: 50px; font-size: 16px; letter-spacing: 1px; }
    
    .center-btn-group { display: flex; gap: 20px; }
    .center-btn {
      padding: 14px 32px;
      font-size: 16px;
      font-family: inherit;
      background-color: #ff6b35;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: filter 0.2s;
    }
    .center-btn.secondary {
      background-color: #1a1614;
      border: 2px solid #4a3c31;
      color: #ccc;
    }
    .center-btn:hover { filter: brightness(1.2); }

    /* 엔딩 도감 팝업 */
    #archive-popup {
      background: #14100e;
      border: 2px solid #4a3c31;
      width: 660px;
      max-height: 440px;
      padding: 30px;
      overflow-y: auto;
    }
    #archive-popup h2 {
      margin-bottom: 20px; color: #ff8c42; font-size: 22px;
      border-bottom: 1px solid #332821; padding-bottom: 10px;
    }
    .archive-item { margin-bottom: 15px; padding: 15px; background: #1c1714; border: 1px solid #2d241f; }
    .archive-title { font-weight: bold; color: #ff6b35; margin-bottom: 8px; font-size: 16px; }
    .archive-desc { font-size: 14px; color: #aaa; line-height: 1.5; white-space: pre-line; }
    .locked { color: #555; font-style: italic; }
  </style>
</head>
<body>

<div id="game-container">
  <!-- 배경 모닥불 -->
  <div id="campfire-scene">
    <div class="fire-anim" id="fire-icon">🔥</div>
  </div>

  <!-- 하단 비주얼 노벨 대화 UI -->
  <div id="dialogue-box">
    <div>
      <div id="char-name"></div>
      <div id="char-text"></div>
    </div>
    <div id="choice-container"></div>
  </div>

  <!-- 시작 화면 -->
  <div id="start-screen" class="overlay">
    <h1>bonfire</h1>
    <div class="subtitle">어두운 숲, 타오르는 불꽃, 그리고 당신의 성향</div>
    <div class="center-btn-group">
      <button class="center-btn" onclick="startGame()">게임 시작</button>
      <button class="center-btn secondary" onclick="openArchive()">엔딩 도감</button>
    </div>
  </div>

  <!-- 엔딩 도감 팝업 -->
  <div id="archive-screen" class="overlay hidden">
    <div id="archive-popup">
      <h2>📖 엔딩 기록</h2>
      <div id="archive-list"></div>
      <div style="text-align: right; margin-top: 25px;">
        <button class="center-btn secondary" onclick="closeArchive()">닫기</button>
      </div>
    </div>
  </div>

  <!-- 엔딩 화면 -->
  <div id="ending-screen" class="overlay hidden">
    <h1 id="end-title" style="font-size: 30px; color: #ff8c42;"></h1>
    <div id="end-desc" class="subtitle" style="max-width: 680px; text-align: center; line-height: 1.8; margin: 25px 0 45px 0; color: #ccc; white-space: pre-line;"></div>
    <button class="center-btn" onclick="returnToTitle()">타이틀로 돌아가기</button>
  </div>
</div>

<script>
  /* --- [1. MBTI 성향 시스템 변수 (UI에 절대 드러나지 않음)] --- */
  let tendencies = {
    S: 0,         // Survival (개인 생존주의)
    Sacrifice: 0, // Sacrifice (이타 및 희생)
    I: 0,         // Inquiry (세계의 진실 탐구)
    T: 0          // Trust (타인을 향한 신뢰, 음수면 불신)
  };

  /* --- [2. 전체 방대한 스토리 및 대사 트리 (JSON 구조)] --- */
  const STORY_TREE = {
    // === [오프닝] ===
    "start": {
      name: "나",
      text: "스산한 밤바람이 숲을 매섭게 흔든다. 모닥불의 타닥거리는 소리만이 고요함을 깨우고 있다.\n이 깊고 어두운 숲속에서 홀로 밤을 지새워야 한다.",
      choices: [
        { text: "바람막이가 될 만한 돌을 돌려쌓아 내 자리를 굳건히 한다.", next: "opening_2", effect: { S: 1 } },
        { text: "불꽃의 색이 가끔 기묘한 파란색으로 변한다. 가만히 응시한다.", next: "opening_2", effect: { I: 1 } }
      ]
    },
    "opening_2": {
      name: "나",
      text: "저 멀리 어둠 속에서 마른 나뭇잎을 밟는 발소리가 들려온다.\n누군가 이 불빛을 향해 천천히 다가오고 있다.",
      choices: [
        { text: "길을 잃은 사람일 것이다. 불길을 키워 위치를 알려준다.", next: "npc1_1", effect: { T: 1, Sacrifice: 1 } },
        { text: "무슨 위협이 될지 모른다. 손을 뻗어 단단한 나무 막대기를 쥔다.", next: "npc1_1", effect: { T: -1, S: 1 } }
      ]
    },

    // === [NPC 1: 눈보라를 헤쳐 온 나무꾼] ===
    "npc1_1": {
      name: "추위에 떠는 나무꾼",
      text: "얼굴에 동상이 걸린 사내가 굳은 표정으로 불빛 곁에 멈춰 섰다.\n'살았군... 불빛이 아니었다면 이대로 얼어 죽을 뻔했소. 혹시 옆에 좀 앉아도 되겠소?'",
      choices: [
        { text: "'그러시오. 추운 밤인데 어서 앉아 몸을 녹이시오.'", next: "npc1_warm", effect: { T: 2, Sacrifice: 1 } },
        { text: "'손에 아무것도 쥐지 않은 것을 먼저 보여주시오.'", next: "npc1_cold", effect: { T: -2, S: 1 } }
      ]
    },
    "npc1_warm": {
      name: "추위에 떠는 나무꾼",
      text: "사내가 고맙다며 자리에 앉아 품에서 딱딱하게 얼어붙은 빵 한 조각을 꺼낸다.\n'이거라도 나눠 먹읍시다. 이 험한 숲에 왜 혼자 이러고 있는 거요?'",
      choices: [
        { text: "'나도 모르겠소. 정신을 차려보니 이 모닥불 앞이었고, 불을 끌 수가 없었소.'", next: "npc1_end", effect: { I: 2 } },
        { text: "'그저 숲을 빠져나갈 아침을 기다릴 뿐이오. 빵은 사양하겠소.'", next: "npc1_end", effect: { S: 1 } }
      ]
    },
    "npc1_cold": {
      name: "추위에 떠는 나무꾼",
      text: "사내가 씁쓸하게 웃으며 도끼를 멀리 내려놓는다.\n'험악한 세상이니 이해하오. 그런데 당신, 이 불을 너무 오래 피우진 마시오. 숲이 이 불빛을... 아주 싫어하니까.'",
      choices: [
        { text: "'숲이 불빛을 싫어한다니? 그게 대체 무슨 뜻이오?'", next: "npc1_end", effect: { I: 2 } },
        { text: "'추워서 피운 불일 뿐이오. 쓸데없는 소리 말고 몸이나 녹이시오.'", next: "npc1_end", effect: { S: 2 } }
      ]
    },
    "npc1_end": {
      name: "추위에 떠는 나무꾼",
      text: "'아무튼 은혜는 입었소. 난 내일 아침 일찍 숲을 빠져나갈 거요. 당신도 조심하시오.'\n사내는 낡은 가죽 지도 한 장을 남겨두고 불 옆에서 눈을 감았다.",
      choices: [
        { text: "남겨진 지도를 챙기며 타닥거리는 불빛을 멍하니 바라본다.", next: "npc2_1", effect: {} }
      ]
    },

    // === [NPC 2: 도망쳐 나온 학자] ===
    "npc2_1": {
      name: "겁에 질린 학자",
      text: "다음 날 새벽, 안경이 깨진 학자가 허겁지겁 나타나 모닥불을 보며 소리친다.\n'멍청하군! 이 불을 피우면 안 돼! 당장 흙을 덮어 불을 끄시오!'",
      choices: [
        { text: "'이 추위에 불을 끄면 얼어 죽소! 진정하고 이유부터 말해보시오.'", next: "npc2_survival", effect: { S: 2 } },
        { text: "'당장 불을 꺼야 하는 이유가 뭐요? 이 불에 얽힌 비밀을 아는 거요?'", next: "npc2_secret", effect: { I: 2 } }
      ]
    },
    "npc2_survival": {
      name: "겁에 질린 학자",
      text: "'얼어 죽는 건 고통스럽지 않아! 하지만 저 불빛이 저 깊은 구덩이 속의 \"눈동자들\"을 깨우면... 우리 모두 끝이란 말이오!'",
      choices: [
        { text: "그가 극도로 겁에 질린 것을 보고, 따뜻한 물 한 잔을 건네며 진정시킨다.", next: "npc2_end", effect: { Sacrifice: 2, T: 1 } },
        { text: "미친 사람이라 생각하고, 모닥불에 접근하지 못하게 거칠게 밀쳐낸다.", next: "npc2_end", effect: { S: 2, T: -1 } }
      ]
    },
    "npc2_secret": {
      name: "겁에 질린 학자",
      text: "'이 숲은 고대의 거대한 숨구멍이고, 이 모닥불은 놈들을 깨우는 신호탄이요!\n당신이 불길을 살려둘수록 숲 지하의 놈들이 숨을 쉬기 시작할 거요!'",
      choices: [
        { text: "'정말 지하에 무언가 살고 있단 말이오? 증거가 있소?'", next: "npc2_end", effect: { I: 2 } },
        { text: "'미신과 음모론일 뿐이다. 나는 그저 살아남아 나가기만 하면 된다.'", next: "npc2_end", effect: { S: 2 } }
      ]
    },
    "npc2_end": {
      name: "겁에 질린 학자",
      text: "학자는 땀을 흘리며 뒷걸음질 쳤다.\n'내 경고를 잊지 마시오... 온기에 눈이 멀어 심연을 보지 못하는 어리석은 자여...'\n그는 기묘한 문자가 적힌 양피지를 떨어뜨린 채 어둠 속으로 도망쳤다.",
      choices: [
        { text: "양피지를 주워 들고 다시 고요해진 모닥불에 장작을 넣는다.", next: "npc3_1", effect: {} }
      ]
    },

    // === [NPC 3: 상처 입은 어린 파수꾼] ===
    "npc3_1": {
      name: "상처 입은 파수꾼 소녀",
      text: "밤이 깊어지자, 피 묻은 가죽 갑옷을 입은 소녀가 절뚝거리며 다가왔다.\n가슴팍에는 기괴하게 꿈틀거리는 검은 상처가 번지고 있었다.\n'불빛... 아직 따뜻한 불빛이 남아있었어...'",
      choices: [
        { text: "'꼬마야, 괜찮니? 어디서 이런 다친 거야?' 걱정하며 부축한다.", next: "npc3_sacrifice", effect: { Sacrifice: 2, T: 1 } },
        { text: "뒤에 무서운 추격자가 따라올지 모르니 주변 어둠부터 경계한다.", next: "npc3_reject", effect: { S: 2, T: -1 } }
      ]
    },
    "npc3_sacrifice": {
      name: "상처 입은 파수꾼 소녀",
      text: "'저 너머에... 길을 잃은 우리 마을 사람들이 얼어붙고 있어요.\n부탁이에요, 당신의 장작을 모두 던져 넣어 이 모닥불을 거대하게 키워주세요. 그래야 사람들이 길을 찾아요...'",
      choices: [
        { text: "'하지만 불을 키우면 숲의 괴물들도 몰려올 거다. 그건 너무 위험해.'", next: "npc3_end", effect: { S: 2 } },
        { text: "'알겠다. 내 장작을 아끼지 않고 모두 불태워 길을 밝혀주마.'", next: "npc3_end", effect: { Sacrifice: 3 } }
      ]
    },
    "npc3_reject": {
      name: "상처 입은 파수꾼 소녀",
      text: "'경계하시는군요... 맞아요, 제 안의 검은 상처가 이 숲의 저주를 품고 있으니까요.\n저와 너무 가까이 있으면 당신도 이 어둠에 전염될지 몰라요.'",
      choices: [
        { text: "'그 검은 멍은 어떻게 생기는 거지? 모닥불과 관련이 있는 건가?'", next: "npc3_end", effect: { I: 2 } },
        { text: "전염을 막기 위해 소녀에게 장작을 조금 쥐여주고 다른 곳으로 가라 권한다.", next: "npc3_end", effect: { S: 2 } }
      ]
    },
    "npc3_end": {
      name: "상처 입은 파수꾼 소녀",
      text: "소녀는 당신의 눈빛을 담담히 바라보았다.\n'당신이 어떤 선택을 하든... 이 불꽃은 곧 끝을 맞이할 거예요. 운명이 이끄는 대로 가세요.'\n소녀는 작은 은빛 팬던트를 두고 조용히 자리를 떴다.",
      choices: [
        { text: "이제 밤의 끝이 다가온다. 마지막 방랑자가 걸어오는 소리가 들린다.", next: "npc4_1", effect: {} }
      ]
    },

    // === [NPC 4: 침묵의 방랑 기사 (성향 반사 노드)] ===
    "npc4_1": {
      name: "침묵의 방랑 기사",
      text: "거대한 대검을 멘 늙은 기사가 묵직한 발걸음으로 모닥불 앞에 멈춰 섰다.\n그는 말없이 당신과 타오르는 불꽃을 번갈아 응시한다.",
      choices: [
        { text: "기사의 눈을 마주 보며 침묵을 지킨다.", next: "npc4_eval", effect: {} }
      ]
    },
    "npc4_eval": {
      name: "침묵의 방랑 기사",
      text: "기사가 입을 열었다.\n'나는 이 숲을 지나는 수많은 방랑자들을 보았지...'\n(기사는 당신이 숲에서 행한 선택들의 냄새를 맡고 있습니다.)",
      choices: [
        { text: "기사가 내릴 마지막 평가를 기다린다.", next: "check_ending", effect: {} }
      ]
    }
  };

  /* --- [3. 엔딩 데이터 및 도감 저장소] --- */
  const ENDINGS = {
    "END_1": {
      id: "END_1",
      title: "[엔딩 1: 차가운 탈출]",
      desc: "당신은 타인의 호의를 경계하고 오직 자신의 안위를 최우선으로 삼았습니다.\n\n동이 트자마자 당신은 나그네들이 남긴 장비와 지도를 챙겨 냉정하게 숲을 빠져나왔습니다. 뒤에서 길을 잃은 이들의 비명과 차가운 눈보라가 몰아쳤지만, 당신은 단 한 번도 뒤돌아보지 않았습니다.\n\n비록 혼자뿐이지만, 당신은 살아남아 문명 세계로 복귀했습니다."
    },
    "END_2": {
      id: "END_2",
      title: "[엔딩 2: 구원의 봉화]",
      desc: "당신은 자신의 손해와 위험을 감수하면서도 타인을 향한 따뜻한 손길을 거두지 않았습니다.\n\n당신이 아낌없이 짚어 넣은 불꽃은 어둠을 찢는 숲의 가장 거대한 등대가 되었습니다. 빛을 본 수많은 피난민과 상처 입은 이들이 모닥불로 모여들었고, 서로의 온기를 나누며 얼어붙은 숲을 이겨냈습니다.\n\n당신은 그들이 맹세한 영원한 영웅이자 구원자가 되었습니다."
    },
    "END_3": {
      id: "END_3",
      title: "[엔딩 3: 고대의 봉인]",
      desc: "당신은 눈앞의 생존이나 얄빡한 호의에 흔들리지 않고, 이 숲과 모닥불이 가진 기괴한 진실을 끈질기게 파헤쳤습니다.\n\n불꽃의 진정한 기원과 숲 지하에 도사린 심연의 비밀을 깨달은 당신은 평범한 인간의 길을 포기했습니다. 당신은 스스로 불꽃을 제어하는 고대의 파수꾼이 되어, 상식을 벗어난 영원한 신비 속으로 사라졌습니다."
    },
    "END_4": {
      id: "END_4",
      title: "[엔딩 4: 안개 속의 방황]",
      desc: "당신은 확고한 생존의 비정함도, 자신을 내던지는 희생도, 심연을 쫓는 광기도 택하지 않았습니다.\n\n모든 것이 애매했던 당신의 불꽃은 이내 짙은 안개 속에 먹혀들어가며 차갑게 식어갔습니다. 어디로 가야 할지 방향을 잃은 당신은 스산한 숲속의 잊혀진 또 다른 방랑자가 되어 영원히 밤의 어둠을 헤매게 되었습니다."
    }
  };

  function getUnlockedEndings() {
    const data = localStorage.getItem("bonfire_endings_mbti");
    return data ? JSON.parse(data) : [];
  }

  function unlockEnding(id) {
    const list = getUnlockedEndings();
    if (!list.includes(id)) {
      list.push(id);
      localStorage.setItem("bonfire_endings_mbti", JSON.stringify(list));
    }
  }

  /* --- [4. 게임 렌더링 엔진] --- */
  function startGame() {
    // 성향 변수 초기화
    tendencies = { S: 0, Sacrifice: 0, I: 0, T: 0 };
    
    document.getElementById("start-screen").classList.add("hidden");
    document.getElementById("ending-screen").classList.add("hidden");
    renderScene("start");
  }

  function renderScene(sceneId) {
    // 4번 NPC 평가 노드에서 성향에 따른 기사의 대사 변경 처리
    if (sceneId === "npc4_eval") {
      const scene = STORY_TREE["npc4_eval"];
      if (tendencies.I >= 4) {
        scene.text = "기사가 묵직하게 입을 열었다.\n'당신의 눈동자는 온기가 아니라, 저 불꽃 밑에 가려진 기괴한 진실을 파헤치려는 호기심으로 번뜩이고 있군. 그 지식이 당신을 구원할지, 파멸시킬지 지켜보겠소.'";
      } else if (tendencies.Sacrifice >= 4) {
        scene.text = "기사가 묵직하게 입을 열었다.\n'어리석을 정도로 자신의 장작을 아끼지 않고 남을 위해 온기를 나누었군... 그 미련한 희생이 이 얼어붙은 숲에 어떤 기적을 부를지 지켜보겠소.'";
      } else {
        scene.text = "기사가 묵직하게 입을 열었다.\n'당신의 몸에서는 타인은 어찌 되든 나만은 살아서 나가겠다는 차갑고 독한 생존의 냄새가 나는군. 그 비정함이야말로 이 숲을 빠져나갈 유일한 무기일지도 모르지.'";
      }
    }

    // 엔딩 판정 분기점에 도달했을 때
    if (sceneId === "check_ending") {
      calculateAndTriggerEnding();
      return;
    }

    const scene = STORY_TREE[sceneId];
    if (!scene) return;

    document.getElementById("char-name").innerText = scene.name;
    document.getElementById("char-text").innerText = scene.text;

    const choiceContainer = document.getElementById("choice-container");
    choiceContainer.innerHTML = "";

    scene.choices.forEach(choice => {
      const btn = document.createElement("button");
      btn.className = "choice-btn";
      btn.innerText = "▶ " + choice.text;
      btn.onclick = () => {
        // 선택지 클릭 시 성향 변수 조용히 누적
        if (choice.effect) {
          for (let key in choice.effect) {
            tendencies[key] += choice.effect[key];
          }
        }
        renderScene(choice.next);
      };
      choiceContainer.appendChild(btn);
    });
  }

  /* --- [5. 최종 엔딩 계산 (MBTI 판정식)] --- */
  function calculateAndTriggerEnding() {
    let finalEndId = "END_4"; // 기본값 (안개 속의 방황)

    // 성향 수치 기반 판정 (가장 높은 특성이 엔딩 결정)
    if (tendencies.I >= 4 && tendencies.I >= tendencies.S && tendencies.I >= tendencies.Sacrifice) {
      finalEndId = "END_3"; // 고대의 봉인
    } else if (tendencies.Sacrifice >= 4 && tendencies.Sacrifice >= tendencies.S) {
      finalEndId = "END_2"; // 구원의 봉화
    } else if (tendencies.S >= 4) {
      finalEndId = "END_1"; // 차가운 탈출
    }

    const endData = ENDINGS[finalEndId];
    unlockEnding(finalEndId); // 도감에 자동 해금 저장

    // 불꽃 연출을 엔딩에 맞게 극적으로 변경
    const icon = document.getElementById("fire-icon");
    if (finalEndId === "END_3") icon.innerText = "🔮";
    else if (finalEndId === "END_2") icon.innerText = "🌟";
    else if (finalEndId === "END_1") icon.innerText = "💨";
    else icon.innerText = "🌫️";

    document.getElementById("end-title").innerText = endData.title;
    document.getElementById("end-desc").innerText = endData.desc;
    document.getElementById("ending-screen").classList.remove("hidden");
  }

  function returnToTitle() {
    document.getElementById("fire-icon").innerText = "🔥";
    document.getElementById("ending-screen").classList.add("hidden");
    document.getElementById("start-screen").classList.remove("hidden");
  }

  /* --- [6. 도감 팝업 제어] --- */
  function openArchive() {
    const list = document.getElementById("archive-list");
    list.innerHTML = "";
    const unlocked = getUnlockedEndings();

    Object.values(ENDINGS).forEach(end => {
      const item = document.createElement("div");
      item.className = "archive-item";
      if (unlocked.includes(end.id)) {
        item.innerHTML = `<div class="archive-title">${end.title} [ 기록됨 ]</div><div class="archive-desc">${end.desc}</div>`;
      } else {
        item.innerHTML = `<div class="archive-title locked">??? [ 미발견 결말 ]</div><div class="archive-desc locked">아직 이 결말에 도달하지 못했습니다. 모닥불에서 다른 선택을 시도해 보세요.</div>`;
      }
      list.appendChild(item);
    });

    document.getElementById("archive-screen").classList.remove("hidden");
  }

  function closeArchive() {
    document.getElementById("archive-screen").classList.add("hidden");
  }
</script>
