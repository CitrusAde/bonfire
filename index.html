<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Quarter-View Arena (LoL Style)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #111; color: #fff;
      font-family: 'Malgun Gothic', sans-serif;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; overflow: hidden; user-select: none;
    }
    #game-container {
      width: 980px; height: 540px; position: relative;
      border: 3px solid #333; box-shadow: 0 0 40px rgba(0,0,0,0.9);
      background-color: #1a1c23; /* 투기장 바닥 색 */
      cursor: crosshair; overflow: hidden;
    }
    canvas { display: block; width: 100%; height: 100%; }
    
    /* 하단 스킬 UI */
    #ui-bar {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 15px; z-index: 10; pointer-events: none;
    }
    .skill-icon {
      width: 60px; height: 60px; background: #222; border: 2px solid #555;
      border-radius: 8px; display: flex; flex-direction: column;
      justify-content: center; align-items: center; font-weight: bold;
      position: relative; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .skill-key { font-size: 14px; color: #ffcc00; margin-bottom: 2px; }
    .skill-name { font-size: 11px; color: #aaa; }
    .cooldown-overlay {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 0%;
      background: rgba(0, 0, 0, 0.75); transition: height 0.05s linear;
      display: flex; justify-content: center; align-items: center;
      color: #fff; font-size: 18px; font-family: monospace;
    }
    
    /* 점수 및 체력 표시 */
    #top-bar {
      position: absolute; top: 15px; left: 20px; right: 20px;
      display: flex; justify-content: space-between; font-size: 18px;
      font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.8); pointer-events: none;
    }
    #hp-bar-bg { width: 200px; height: 18px; background: #333; border: 2px solid #000; border-radius: 9px; overflow: hidden; display: inline-block; vertical-align: middle; }
    #hp-bar { width: 100%; height: 100%; background: #2ecc71; transition: width 0.1s; }
  </style>
</head>
<body>

<div id="game-container">
  <canvas id="gameCanvas" width="980" height="540"></canvas>
  
  <div id="top-bar">
    <div>❤️ HP: <div id="hp-bar-bg"><div id="hp-bar"></div></div></div>
    <div>⚔️ 처치한 적: <span id="score" style="color:#ffcc00;">0</span></div>
  </div>

  <div id="ui-bar">
    <div class="skill-icon" id="skill-q">
      <div class="skill-key">Q</div>
      <div class="skill-name">에너지탄</div>
      <div class="cooldown-overlay" id="cd-q"></div>
    </div>
    <div class="skill-icon" style="opacity: 0.4;">
      <div class="skill-key">W</div>
      <div class="skill-name">(잠금)</div>
    </div>
    <div class="skill-icon" style="opacity: 0.4;">
      <div class="skill-key">E</div>
      <div class="skill-name">(잠금)</div>
    </div>
    <div class="skill-icon" style="border-color: #e74c3c; opacity: 0.4;">
      <div class="skill-key" style="color:#e74c3c;">R</div>
      <div class="skill-name">궁극기</div>
    </div>
  </div>
</div>

<script>
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const hpBar = document.getElementById("hp-bar");
  const scoreEl = document.getElementById("score");
  const cdQEl = document.getElementById("cd-q");

  /* --- [게임 전역 상태] --- */
  let score = 0;
  let mouseX = 0, mouseY = 0;
  
  // 플레이어 (챔피언)
  const player = {
    x: 490, y: 270, radius: 18,
    targetX: 490, targetY: 270,
    speed: 4.5, hp: 100, maxHp: 100,
    color: "#3498db"
  };

  // 우클릭 이동 모션 이펙트 (초록색 클릭 표식)
  let clickMarker = { x: 0, y: 0, radius: 0, alpha: 0 };

  // 투사체 (스킬 & 공격) 및 적 리스트
  let bullets = [];
  let enemies = [];
  let particles = [];

  // 스킬 쿨타임 (Q)
  let qCooldown = 0;
  const Q_MAX_CD = 40; // 프레임 기준 (약 0.65초)

  /* --- [입력 처리 (롤 컨트롤)] --- */
  // 마우스 위치 추적
  canvas.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
  });

  // ★ 브라우저 우클릭 메뉴 방지 및 우클릭 이동 구현!
  canvas.addEventListener("contextmenu", (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    player.targetX = e.clientX - rect.left;
    player.targetY = e.clientY - rect.top;

    // 우클릭 지점에 롤처럼 표식 애니메이션 생성
    clickMarker = { x: player.targetX, y: player.targetY, radius: 5, alpha: 1 };
  });

  // 키보드 스킬 (Q) 발동
  window.addEventListener("keydown", (e) => {
    if (e.key === "q" || e.key === "Q" || e.key === "ㅂ") {
      castSkillQ();
    }
  });

  // 좌클릭으로도 Q 스킬 사용 가능하게 (편의성)
  canvas.addEventListener("click", () => { castSkillQ(); });

  function castSkillQ() {
    if (qCooldown > 0) return; // 쿨타임 중이면 발동 불가
    qCooldown = Q_MAX_CD;

    // 플레이어에서 마우스 커서 방향으로 각도 계산 (논타겟팅)
    const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
    
    bullets.push({
      x: player.x, y: player.y,
      vx: Math.cos(angle) * 12, // 빠른 투사체 속도
      vy: Math.sin(angle) * 12,
      radius: 8, color: "#00ffff", range: 500, traveled: 0
    });
  }

  /* --- [적 스폰 로직] --- */
  function spawnEnemy() {
    // 투기장 바깥 가장자리에서 생성
    let x, y;
    if (Math.random() < 0.5) {
      x = Math.random() < 0.5 ? -30 : canvas.width + 30;
      y = Math.random() * canvas.height;
    } else {
      x = Math.random() * canvas.width;
      y = Math.random() < 0.5 ? -30 : canvas.height + 30;
    }

    enemies.push({
      x: x, y: y, radius: 16,
      speed: 1.8 + Math.random() * 0.8,
      hp: 2, color: "#e74c3c"
    });
  }
  setInterval(spawnEnemy, 800); // 0.8초마다 적 스폰

  /* --- [메인 게임 루프 (60FPS)] --- */
  function update() {
    // 1. 플레이어 우클릭 목적지로 이동
    const dx = player.targetX - player.x;
    const dy = player.targetY - player.y;
    const dist = Math.hypot(dx, dy);
    if (dist > player.speed) {
      player.x += (dx / dist) * player.speed;
      player.y += (dy / dist) * player.speed;
    } else {
      player.x = player.targetX;
      player.y = player.targetY;
    }

    // 2. Q 스킬 쿨타임 감소
    if (qCooldown > 0) {
      qCooldown--;
      const pct = (qCooldown / Q_MAX_CD) * 100;
      cdQEl.style.height = pct + "%";
      cdQEl.innerText = (qCooldown / 60).toFixed(1);
    } else {
      cdQEl.style.height = "0%";
      cdQEl.innerText = "";
    }

    // 3. 투사체 이동 및 충돌
    for (let i = bullets.length - 1; i >= 0; i--) {
      let b = bullets[i];
      b.x += b.vx; b.y += b.vy;
      b.traveled += Math.hypot(b.vx, b.vy);

      // 사거리 초과 시 제거
      if (b.traveled > b.range || b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
        bullets.splice(i, 1); continue;
      }

      // 적과 투사체 충돌 판정
      for (let j = enemies.length - 1; j >= 0; j--) {
        let e = enemies[j];
        if (Math.hypot(b.x - e.x, b.y - e.y) < b.radius + e.radius) {
          e.hp--;
          createParticles(e.x, e.y, "#ffcc00", 6); // 타격 파티클
          bullets.splice(i, 1);
          
          if (e.hp <= 0) {
            createParticles(e.x, e.y, "#e74c3c", 15); // 처치 파티클(피)
            enemies.splice(j, 1);
            score++;
            scoreEl.innerText = score;
          }
          break;
        }
      }
    }

    // 4. 적 이동 (플레이어 추적) 및 플레이어와 충돌
    for (let i = enemies.length - 1; i >= 0; i--) {
      let e = enemies[i];
      const edx = player.x - e.x;
      const edy = player.y - e.y;
      const edist = Math.hypot(edx, edy);

      e.x += (edx / edist) * e.speed;
      e.y += (edy / edist) * e.speed;

      // 플레이어 피격!
      if (edist < player.radius + e.radius) {
        player.hp -= 0.5;
        hpBar.style.width = Math.max(0, player.hp) + "%";
        if (player.hp <= 0) {
          alert("사망했습니다! 처치한 적: " + score);
          location.reload();
        }
      }
    }

    // 5. 파티클 업데이트
    for (let i = particles.length - 1; i >= 0; i--) {
      let p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.alpha -= 0.04;
      if (p.alpha <= 0) particles.splice(i, 1);
    }
  }

  function createParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
        radius: Math.random() * 4 + 2, color: color, alpha: 1
      } );
    }
  }

  /* --- [화면 그리기 (쿼터뷰 2.5D 스타일)] --- */
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. 투기장 바닥 그리드 (쿼터뷰 공간감 연출)
    ctx.strokeStyle = "#22252e";
    ctx.lineWidth = 1;
    for (let x = 0; x < canvas.width; x += 40) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += 40) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }

    // 2. 우클릭 이동 표식 (녹색 동그라미 확장이펙트)
    if (clickMarker.alpha > 0) {
      ctx.save();
      ctx.strokeStyle = `rgba(46, 204, 113, ${clickMarker.alpha})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      // 타원(쿼터뷰 바닥 원)으로 그리기
      ctx.ellipse(clickMarker.x, clickMarker.y, clickMarker.radius, clickMarker.radius * 0.6, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
      clickMarker.radius += 1.5;
      clickMarker.alpha -= 0.05;
    }

    // 3. 쿼터뷰의 핵심: Y축 기준 정렬 (Z-Order)
    // 아래쪽에 있는 오브젝트를 나중에 그려야 입체감이 겹쳐 보임!
    let renderList = [
      { type: 'player', y: player.y },
      ...enemies.map(e => ({ type: 'enemy', data: e, y: e.y })),
      ...bullets.map(b => ({ type: 'bullet', data: b, y: b.y }))
    ];
    renderList.sort((a, b) => a.y - b.y);

    for (let item of renderList) {
      if (item.type === 'player') {
        // 플레이어 그림자 (바닥 타원)
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.beginPath();
        ctx.ellipse(player.x, player.y + 14, 16, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        // 플레이어 몸체
        ctx.fillStyle = player.color;
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();

        // 시선 방향 (마우스를 바라보는 무기/포신)
        const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
        ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(player.x + Math.cos(angle) * 26, player.y + Math.sin(angle) * 26);
        ctx.stroke();

      } else if (item.type === 'enemy') {
        let e = item.data;
        // 적 그림자
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.beginPath();
        ctx.ellipse(e.x, e.y + 12, 14, 7, 0, 0, Math.PI * 2);
        ctx.fill();

        // 적 몸체
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#900"; ctx.lineWidth = 2; ctx.stroke();

      } else if (item.type === 'bullet') {
        let b = item.data;
        ctx.fillStyle = b.color;
        ctx.shadowColor = "#00ffff"; ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0; // 그림자 리셋
      }
    }

    // 4. 타격 파티클 그리기
    for (let p of particles) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1.0;
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }
  loop();
</script>
</body>
</html>
