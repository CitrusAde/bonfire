<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>bonfire - Survive Until Dawn (Audio Version)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #050505; color: #fff;
      font-family: 'Malgun Gothic', sans-serif;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; overflow: hidden; user-select: none;
      cursor: crosshair;
    }

    #game-container {
      width: 980px; height: 540px; position: relative; overflow: hidden;
      border: 4px solid #1c1815; box-shadow: 0 0 50px rgba(0,0,0,0.95);
      background-color: #0c0908;
    }

    .shake { animation: shake-anim 0.4s both; }
    @keyframes shake-anim {
      0%, 100% { transform: translate(0, 0); }
      20%, 60% { transform: translate(-10px, 6px); }
      40%, 80% { transform: translate(10px, -6px); }
    }

    #flashlight {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 5;
      background: radial-gradient(circle 140px at 50% 50%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.4) 50%, rgba(5,4,4,0.95) 85%);
    }

    #ui-bar {
      position: absolute; top: 15px; left: 20px; right: 20px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 10; font-weight: bold; font-size: 18px; text-shadow: 0 0 10px #000;
    }
    .fuel-meter { display: flex; align-items: center; gap: 10px; }
    #fuel-bar-bg { width: 200px; height: 16px; background: #332; border: 2px solid #554; border-radius: 8px; overflow: hidden; }
    #fuel-bar { width: 100%; height: 100%; background: #ff5500; transition: width 0.2s; }
    .clock { font-size: 24px; color: #ffcc00; font-family: monospace; }

    #bonfire {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 100px; height: 100px; z-index: 2; display: flex; justify-content: center; align-items: center;
      font-size: 70px; cursor: pointer; filter: drop-shadow(0 0 30px rgba(255, 85, 0, 0.9));
      transition: transform 0.1s;
    }
    #bonfire:active { transform: translate(-50%, -50%) scale(0.95); }

    #wood-pile {
      position: absolute; bottom: 20px; right: 30px; width: 80px; height: 80px; z-index: 6;
      background-color: #2b1f17; border: 2px solid #543d2b; border-radius: 10px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      cursor: pointer; font-size: 32px; box-shadow: 0 0 15px rgba(0,0,0,0.8); transition: all 0.15s;
    }
    #wood-pile:hover { background-color: #3d2c20; transform: scale(1.05); }
    #wood-label { font-size: 12px; color: #aaa; margin-top: 4px; }

    #holding-icon {
      position: absolute; pointer-events: none; z-index: 20;
      font-size: 36px; display: none; transform: translate(-50%, -50%);
      filter: drop-shadow(0 0 10px #000);
    }

    .monster {
      position: absolute; width: 60px; height: 60px; z-index: 3; pointer-events: none;
      display: flex; justify-content: center; align-items: center; font-size: 40px;
      filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.8)); transition: filter 0.1s;
    }
    .burning { filter: drop-shadow(0 0 25px rgba(255, 255, 255, 1)) brightness(2); }

    .overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(5, 4, 4, 0.95); z-index: 30;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    .hidden { display: none !important; }
    h1 { font-size: 50px; color: #ff5500; margin-bottom: 15px; letter-spacing: 4px; }
    p { font-size: 16px; color: #aaa; margin-bottom: 30px; text-align: center; line-height: 1.6; }
    .btn {
      padding: 15px 40px; font-size: 18px; font-weight: bold;
      background: #ff5500; color: #fff; border: none; border-radius: 5px;
      cursor: pointer; transition: 0.2s;
    }
    .btn:hover { background: #ff7733; transform: scale(1.05); }
  </style>
</head>
<body>

<div id="game-container">
  <div id="flashlight"></div>
  <div id="ui-bar">
    <div class="fuel-meter">
      <span>🔥 모닥불:</span>
      <div id="fuel-bar-bg"><div id="fuel-bar"></div></div>
    </div>
    <div class="clock" id="clock-display">04:00 AM</div>
  </div>

  <div id="bonfire" onclick="feedFire()">🔥</div>
  <div id="wood-pile" onclick="grabWood()">🪵<span id="wood-label">장작 집기</span></div>
  <div id="holding-icon">🪵</div>

  <div id="start-screen" class="overlay">
    <h1>bonfire : 새벽까지</h1>
    <p>
      <b>🔊 스피커 소리를 켜주세요! (실시간 ASMR 사운드 지원)</b><br><br>
      1. 마우스 커서(손전등 빛)로 어둠 속에서 다가오는 귀신을 비춰 지져버리세요!<br>
      2. 모닥불이 꺼지면 죽습니다. 우측 하단 <b>[🪵장작]</b>을 집어 <b>[🔥모닥불]</b>에 던지세요!<br>
      3. 아침(06:00 AM)까지 생존하면 승리합니다.
    </p>
    <button class="btn" onclick="startGame()">어둠 속으로 (게임 시작)</button>
  </div>

  <div id="end-screen" class="overlay hidden">
    <h1 id="end-title">GAME OVER</h1>
    <p id="end-desc">모닥불이 꺼지고 어둠이 당신을 집어삼켰습니다.</p>
    <button class="btn" onclick="startGame()">다시 도전하기</button>
  </div>
</div>

<script>
  /* =========================================================
     ★ Web Audio API 실시간 사운드 생성 엔진 (No Assets!) ★
     ========================================================= */
  let audioCtx = null;
  let windOsc = null;
  let windGain = null;
  let isBurningSoundPlaying = false;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  // 1. 스산한 배경 바람 소리 (드론 BGM)
  function startWindBGM() {
    if (windOsc) return;
    windOsc = audioCtx.createOscillator();
    windGain = audioCtx.createGain();
    
    windOsc.type = 'sawtooth';
    windOsc.frequency.setValueAtTime(45, audioCtx.currentTime); // 낮은 저주파
    
    // 필터를 걸어 웅웅거리는 바람 소리로 변조
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(120, audioCtx.currentTime);
    
    windGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    
    windOsc.connect(filter);
    filter.connect(windGain);
    windGain.connect(audioCtx.destination);
    windOsc.start();
  }

  function stopWindBGM() {
    if (windOsc) {
      windOsc.stop();
      windOsc.disconnect();
      windOsc = null;
    }
  }

  // 2. 모닥불 타닥거리는 ASMR 효과음 (랜덤 파열음)
  function playCrackling() {
    if (!audioCtx || !gameActive) return;
    
    // 백색 소음(Noise) 생성
    const bufferSize = audioCtx.sampleRate * 0.05; // 0.05초 아주 짧은 소리
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }

    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(800 + Math.random() * 1000, audioCtx.currentTime);

    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);

    noise.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    noise.start();
  }

  // 3. 장작을 불에 넣었을 때 화르륵! 소리 (Whoosh)
  function playFireWhoosh() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
    
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
  }

  // 4. 귀신이 손전등 빛에 지져질 때 소리 (Sizzle / Hiss)
  function playGhostSizzle() {
    if (!audioCtx || isBurningSoundPlaying) return;
    isBurningSoundPlaying = true;

    const bufferSize = audioCtx.sampleRate * 0.1;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.setValueAtTime(2500, audioCtx.currentTime); // 날카로운 치이익 소리

    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

    noise.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    noise.start();

    setTimeout(() => { isBurningSoundPlaying = false; }, 100);
  }

  // 5. 게임오버 충격음
  function playGameOverSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(120, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.8);
    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.8);
  }


  /* =========================================================
     ★ 메인 게임 로직 ★
     ========================================================= */
  const container = document.getElementById("game-container");
  const flashlight = document.getElementById("flashlight");
  const holdingIcon = document.getElementById("holding-icon");
  const fuelBar = document.getElementById("fuel-bar");
  const clockDisplay = document.getElementById("clock-display");
  const bonfire = document.getElementById("bonfire");

  let gameActive = false;
  let fuel = 100;
  let timeMinutes = 4 * 60;
  let holdingWood = false;
  let monsters = [];
  let mouseX = 490, mouseY = 270;
  
  let spawnTimer = null;
  let clockTimer = null;
  let asmrTimer = null;
  let loopId = null;

  container.addEventListener("mousemove", (e) => {
    const rect = container.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
    flashlight.style.background = `radial-gradient(circle 140px at ${mouseX}px ${mouseY}px, rgba(0,0,0,0) 0%, rgba(0,0,0,0.4) 50%, rgba(5,4,4,0.96) 85%)`;

    if (holdingWood) {
      holdingIcon.style.left = mouseX + "px";
      holdingIcon.style.top = mouseY + "px";
    }
  });

  function grabWood() {
    if (!gameActive) return;
    holdingWood = true;
    holdingIcon.style.display = "block";
    holdingIcon.style.left = mouseX + "px";
    holdingIcon.style.top = mouseY + "px";
  }

  function feedFire() {
    if (!gameActive || !holdingWood) return;
    holdingWood = false;
    holdingIcon.style.display = "none";
    fuel = Math.min(100, fuel + 35);
    updateUI();
    
    playFireWhoosh(); // ★ 장작 넣는 소리 재생!

    bonfire.style.transform = "translate(-50%, -50%) scale(1.3)";
    setTimeout(() => bonfire.style.transform = "translate(-50%, -50%) scale(1)", 150);
  }

  function spawnMonster() {
    if (!gameActive) return;
    let x, y;
    const edge = Math.floor(Math.random() * 4);
    if (edge === 0) { x = Math.random() * 980; y = -50; }
    else if (edge === 1) { x = 980 + 50; y = Math.random() * 540; }
    else if (edge === 2) { x = Math.random() * 980; y = 540 + 50; }
    else { x = -50; y = Math.random() * 540; }

    const el = document.createElement("div");
    el.className = "monster";
    el.innerText = "👀";
    container.appendChild(el);

    monsters.push({ el: el, x: x, y: y, hp: 100, speed: 0.8 + Math.random() * 0.6 });
  }

  function gameLoop() {
    if (!gameActive) return;

    fuel -= 0.05;
    if (fuel <= 0) {
      endGame(false, "모닥불이 꺼지고 칠흑 같은 어둠이 당신을 집어삼켰습니다.");
      return;
    }
    updateUI();

    for (let i = monsters.length - 1; i >= 0; i--) {
      let m = monsters[i];
      let dx = 490 - m.x;
      let dy = 270 - m.y;
      let distToFire = Math.hypot(dx, dy);

      if (distToFire < 50) {
        fuel -= 30;
        container.classList.add("shake");
        setTimeout(() => container.classList.remove("shake"), 400);
        m.el.remove();
        monsters.splice(i, 1);
        continue;
      }

      m.x += (dx / distToFire) * m.speed;
      m.y += (dy / distToFire) * m.speed;
      m.el.style.left = (m.x - 30) + "px";
      m.el.style.top = (m.y - 30) + "px";

      let distToMouse = Math.hypot(mouseX - m.x, mouseY - m.y);
      
      if (distToMouse < 120) {
        m.hp -= 2.5;
        m.speed = 0.2;
        m.el.classList.add("burning");
        
        playGhostSizzle(); // ★ 빛에 지져질 때 치이익 소리!

        if (m.hp <= 0) {
          m.el.remove();
          monsters.splice(i, 1);
          continue;
        }
      } else {
        m.speed = 0.8;
        m.el.classList.remove("burning");
      }
    }

    loopId = requestAnimationFrame(gameLoop);
  }

  function updateUI() {
    fuelBar.style.width = Math.max(0, fuel) + "%";
    let scale = 0.6 + (fuel / 100) * 0.4;
    bonfire.style.transform = `translate(-50%, -50%) scale(${scale})`;
  }

  function advanceClock() {
    if (!gameActive) return;
    timeMinutes += 2;
    let hours = Math.floor(timeMinutes / 60);
    let mins = timeMinutes % 60;
    clockDisplay.innerText = `0${hours}:${mins < 10 ? '0' + mins : mins} AM`;

    if (timeMinutes >= 6 * 60) {
      endGame(true, "아침 해가 떴습니다! 어둠 속의 괴물들이 물러나고 생존했습니다.");
    }
  }

  function startGame() {
    initAudio();     // ★ 오디오 엔진 활성화
    startWindBGM();  // ★ 스산한 바람 소리 시작

    monsters.forEach(m => m.el.remove());
    monsters = [];
    fuel = 100;
    timeMinutes = 4 * 60;
    holdingWood = false;
    holdingIcon.style.display = "none";
    
    document.getElementById("start-screen").classList.add("hidden");
    document.getElementById("end-screen").classList.add("hidden");
    
    gameActive = true;
    updateUI();

    clearInterval(spawnTimer);
    clearInterval(clockTimer);
    clearInterval(asmrTimer);

    spawnTimer = setInterval(spawnMonster, 1800);
    clockTimer = setInterval(advanceClock, 1000);
    
    // ★ 0.1~0.4초마다 모닥불 타닥거리는 ASMR 랜덤 재생
    asmrTimer = setInterval(() => {
      if (Math.random() > 0.3) playCrackling();
    }, 150);
    
    cancelAnimationFrame(loopId);
    loopId = requestAnimationFrame(gameLoop);
  }

  function endGame(victory, message) {
    gameActive = false;
    stopWindBGM(); // ★ 바람 소리 종료
    if (!victory) playGameOverSound(); // ★ 게임오버 사운드

    clearInterval(spawnTimer);
    clearInterval(clockTimer);
    clearInterval(asmrTimer);
    cancelAnimationFrame(loopId);
    holdingIcon.style.display = "none";

    const titleEl = document.getElementById("end-title");
    titleEl.innerText = victory ? "SURVIVED! (생존 성공)" : "GAME OVER";
    titleEl.style.color = victory ? "#ffcc00" : "#ff3300";
    document.getElementById("end-desc").innerText = message;
    
    document.getElementById("end-screen").classList.remove("hidden");
  }
</script>
</body>
</html>
