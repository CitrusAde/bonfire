<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>bonfire - Advanced Atmosphere</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #050505; color: #dfdfdf;
      font-family: 'DungGeunMo', 'Galmuri11', 'Malgun Gothic', monospace;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; overflow: hidden; user-select: none;
    }
    #game-container {
      width: 980px; height: 540px; background-color: #0d0a0a;
      position: relative; border: 4px solid #1f1a1a;
      box-shadow: 0 0 60px rgba(0,0,0,0.95); overflow: hidden;
      display: flex; flex-direction: column; justify-content: flex-end;
      transition: border-color 0.3s;
    }

    /* 화면 진동 효과 (Shake Juice) */
    .shake { animation: shake-anim 0.4s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake-anim {
      0%, 100% { transform: translate(0, 0); }
      20%, 60% { transform: translate(-8px, 4px); }
      40%, 80% { transform: translate(8px, -4px); }
    }

    #campfire-scene {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 1; pointer-events: none;
    }
    .fire-anim {
      font-size: 85px; filter: drop-shadow(0 0 25px rgba(255, 85, 0, 0.8));
      animation: flicker 1.5s infinite alternate ease-in-out;
    }
    @keyframes flicker {
      0% { transform: scale(0.98) rotate(-1deg); filter: drop-shadow(0 0 20px rgba(255, 85, 0, 0.7)); }
      100% { transform: scale(1.04) rotate(1deg); filter: drop-shadow(0 0 40px rgba(255, 120, 0, 0.95)); }
    }

    #dialogue-box {
      width: 920px; min-height: 190px; margin: 0 auto 20px auto;
      background-color: rgba(14, 11, 11, 0.95); border: 3px solid #4a3c31;
      border-radius: 4px; padding: 24px 30px; position: relative; z-index: 5;
      display: flex; flex-direction: column; justify-content: space-between;
      box-shadow: 0 5px 30px rgba(0,0,0,0.85);
    }
    #char-name { font-size: 18px; color: #ff8c42; font-weight: bold; margin-bottom: 12px; letter-spacing: 1.5px; }
    #char-text { font-size: 16px; color: #eaeaea; line-height: 1.6; min-height: 50px; margin-bottom: 16px; white-space: pre-line; }
    
    /* 타이핑 커서 연출 */
    .typing-cursor::after { content: ' █'; color: #ff8c42; animation: blink 0.8s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    #choice-container { display: flex; flex-direction: column; gap: 8px; opacity: 0; transition: opacity 0.5s ease; }
    .choice-btn {
      background: #1a1614; color: #ccc; border: 1px solid #4a3c31;
      padding: 12px 18px; font-size: 15px; font-family: inherit;
      text-align: left; cursor: pointer; transition: all 0.15s ease;
    }
    .choice-btn:hover { background: #332821; color: #fff; border-color: #ff8c42; transform: translateX(6px); }

    .overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(7, 5, 5, 0.96); display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 10; padding: 40px;
    }
    .hidden { display: none !important; }
    h1 { font-size: 56px; color: #ff6b35; margin-bottom: 15px; letter-spacing: 6px; }
    .subtitle { color: #888; margin-bottom: 50px; font-size: 16px; }
    .center-btn {
      padding: 14px 32px; font-size: 16px; font-family: inherit;
      background-color: #ff6b35; color: #fff; border: none; cursor: pointer; font-weight: bold;
    }
  </style>
</head>
<body>

<div id="game-container">
  <div id="campfire-scene"><div class="fire-anim" id="fire-icon">🔥</div></div>
  
  <div id="dialogue-box">
    <div>
      <div id="char-name"></div>
      <div id="char-text" class="typing-cursor"></div>
    </div>
    <div id="choice-container"></div>
  </div>

  <div id="start-screen" class="overlay">
    <h1>bonfire</h1>
    <div class="subtitle">어두운 숲, 타오르는 불꽃, 그리고 진중한 선택</div>
    <button class="center-btn" onclick="startGame()">어둠 속으로 발을 내딛는다</button>
  </div>
</div>

<script>
  let typingTimer = null;
  let tendencies = { S: 0, Sacrifice: 0, I: 0, T: 0 };

  const STORY_TREE = {
    "start": {
      name: "나",
      text: "스산한 밤바람이 숲을 매섭게 흔든다.\n모닥불의 타닥거리는 소리만이 고요함을 깨우고 있다...",
      choices: [
        { text: "바람막이가 될 만한 돌을 돌려쌓아 내 자리를 굳건히 한다.", next: "opening_2" },
        { text: "불꽃의 색이 가끔 기묘한 파란색으로 변한다. 가만히 응시한다.", next: "opening_2" }
      ]
    },
    "opening_2": {
      name: "나",
      text: "그때, 저 멀리 어둠 속에서 마른 나뭇잎을 밟는 거친 발소리가 들려온다.\n누군가 이 불빛을 향해 빠른 속도로 다가오고 있다!",
      shake: true, // ★ 화면 진동 연출 트리거!
      choices: [
        { text: "길을 잃은 사람일 것이다. 불길을 키워 위치를 알려준다.", next: "npc1_1" },
        { text: "무슨 위협이 될지 모른다. 손을 뻗어 단단한 나무 막대기를 쥔다.", next: "npc1_1" }
      ]
    },
    "npc1_1": {
      name: "추위에 떠는 나무꾼",
      text: "'살았군... 불빛이 아니었다면 이대로 얼어 죽을 뻔했소.'\n사내가 얼굴에 동상이 걸린 채 굳은 표정으로 멈춰 섰다.\n'혹시 옆에 좀 앉아도 되겠소?'",
      choices: [
        { text: "'그러시오. 추운 밤인데 어서 앉아 몸을 녹이시오.'", next: "start" },
        { text: "'손에 아무것도 쥐지 않은 것을 먼저 보여주시오.'", next: "start" }
      ]
    }
  };

  function startGame() {
    document.getElementById("start-screen").classList.add("hidden");
    renderScene("start");
  }

  function renderScene(sceneId) {
    const scene = STORY_TREE[sceneId];
    if (!scene) return;

    // 1. 화면 흔들림(Shake) 효과 처리
    const container = document.getElementById("game-container");
    if (scene.shake) {
      container.classList.add("shake");
      setTimeout(() => container.classList.remove("shake"), 500);
    }

    document.getElementById("char-name").innerText = scene.name;
    const textEl = document.getElementById("char-text");
    const choiceContainer = document.getElementById("choice-container");
    
    // 선택지 숨기기 (타이핑 중에는 선택지 클릭 불가로 긴장감 유지)
    choiceContainer.style.opacity = 0;
    choiceContainer.innerHTML = "";
    
    // 2. 텍스트 타이핑 효과 로직
    textEl.innerText = "";
    textEl.classList.add("typing-cursor");
    if (typingTimer) clearInterval(typingTimer);

    let idx = 0;
    const fullText = scene.text;
    
    typingTimer = setInterval(() => {
      if (idx < fullText.length) {
        textEl.innerText += fullText[idx];
        idx++;
      } else {
        // 타이핑 종료 시 커서 애니메이션 제거 및 선택지 페이드인
        clearInterval(typingTimer);
        textEl.classList.remove("typing-cursor");
        showChoices(scene.choices);
      }
    }, 35); // ★ 글자당 35ms 속도 (조절 가능)
  }

  function showChoices(choices) {
    const choiceContainer = document.getElementById("choice-container");
    choices.forEach(choice => {
      const btn = document.createElement("button");
      btn.className = "choice-btn";
      btn.innerText = "▶ " + choice.text;
      btn.onclick = () => renderScene(choice.next);
      choiceContainer.appendChild(btn);
    });
    // 선택지 서서히 드러나기
    choiceContainer.style.opacity = 1;
  }
</script>
</body>
</html>
